name: Deploy

on:
  push:
    branches: [master]

permissions:
  id-token: write
  contents: read

jobs:
  build-test-deploy:
    name: Build, Test & Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Set up Go 1.22
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Check out code
        uses: actions/checkout@v4

      - name: Build
        run: go build -v ./...

      - name: Unit tests
        run: go test -v ./cmd/... ./internal/...

      - name: Generate static site
        run: |
          go run ./cmd/generate \
            -posts ./web/posts \
            -templates ./web/template \
            -static ./web/static \
            -static-root ./web/static-root \
            -config . \
            -output ./output

      - name: Verify generator output
        run: |
          test -f ./output/index.html
          test -f ./output/archive/index.html
          test -f ./output/about/index.html
          test -f ./output/speaking/index.html
          test -f ./output/contact/index.html
          test -f ./output/feeds/rss
          test -f ./output/404.html
          test -f ./output/_manifest.json
          test -f ./output/robots.txt
          echo "All expected output files present"

      - name: Side-by-side comparison test
        run: go test -v -timeout 120s ./test/comparison/

      - name: E2E link integrity test
        run: go test -v -timeout 120s ./test/e2e/

      # --- Deploy steps ---

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Upload HTML pages to S3
        run: |
          aws s3 sync output/ s3://${{ secrets.S3_BUCKET_NAME }}/ --delete \
            --exclude "*" --include "*.html" --exclude "_manifest.json" \
            --content-type "text/html; charset=utf-8" \
            --cache-control "public, max-age=300"

      - name: Upload RSS feed to S3
        run: |
          aws s3 cp output/feeds/rss s3://${{ secrets.S3_BUCKET_NAME }}/feeds/rss \
            --content-type "application/rss+xml; charset=utf-8" \
            --cache-control "public, max-age=900"

      - name: Upload static assets to S3
        run: |
          aws s3 sync output/assets/ s3://${{ secrets.S3_BUCKET_NAME }}/assets/ --delete \
            --cache-control "public, max-age=31536000, immutable"

      - name: Upload root files to S3
        run: |
          aws s3 sync output/ s3://${{ secrets.S3_BUCKET_NAME }}/ \
            --exclude "*" --include "robots.txt" --include "favicon.ico"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
